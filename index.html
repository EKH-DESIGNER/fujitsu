<!DOCTYPE html>
<html lang="en" dir="ltr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="css/main.css">
</head>

<body>
    <header class="bg-white">
    <div class="container-fluid px-3 px-lg-5">
        <div class="py-0">
            <!-- هدر مخصوص موبایل (این تیکه کمه که اضافه شد) -->
            <div class="d-flex d-lg-none align-items-center justify-content-between py-0">
                <a href="#"><img src="images/logo-fujitsu.svg" alt="Fujitsu" style="width: 120px;"></a>
                <!-- دکمه همبرگری که آیدی منوی تو رو صدا میزنه -->
                <button class="btn border-0 shadow-none p-0" type="button" data-bs-toggle="offcanvas" data-bs-target="#mobileMenu">
                    <i class="bi bi-list fs-1"></i>
                </button>
            </div>

            <!-- هدر دسکتاپ (کد قبلی خودت بدون تغییر) -->
            <div class="d-none d-lg-flex align-items-center justify-content-between py-0">
                <a href="#" class="d-flex">
                    <img src="images/logo-fujitsu.svg" alt="Fujitsu" style="width: 160px;">
                </a>
                <div class="d-flex align-items-center gap-4">
                    <a href="#" class="text-dark text-decoration-none fw-semibold menu-item">About us <i class="bi bi-chevron-down"></i></a>
                    <a href="#" class="text-dark text-decoration-none fw-semibold menu-item">News</a>
                    <a href="#" class="text-dark text-decoration-none fw-semibold menu-item">Investor Relations</a>
                    <a href="#" class="text-dark text-decoration-none fw-semibold menu-item">Careers</a>
                    <span style="width:1px;height:18px;background:#ddd;"></span>
                    <a href="#" class="text-dark fs-3 d-flex align-items-center"><i class="bi bi-globe2 lh-1"></i></a>
                    <div class="bg-light rounded-2 px-3 py-1 d-flex align-items-center gap-2" style="width: 150px;">
                        <input type="text" class="form-control border-0 bg-transparent p-0 shadow-none" placeholder="Enter search">
                        <i class="bi bi-search lh-1"></i>
                    </div>
                </div>
            </div>

            <!-- ردیف دوم دسکتاپ (کد قبلی خودت بدون تغییر) -->
            <div class="d-none d-lg-flex align-items-center justify-content-end gap-4 mt-0 pb-3">
                <a href="#" class="text-dark text-decoration-none fw-semibold menu-item">Industries <i class="bi bi-chevron-down"></i></a>
                <a href="#" class="text-dark text-decoration-none fw-semibold menu-item">Services <i class="bi bi-chevron-down"></i></a>
                <a href="#" class="text-dark text-decoration-none fw-semibold menu-item">Insight</a>
                <a href="#" class="text-dark text-decoration-none fw-semibold menu-item">Uvance</a>
                <a href="#" class="text-dark text-decoration-none fw-semibold menu-item">Uvance Wayfinders</a>
                <a href="#" class="text-dark text-decoration-none fw-semibold menu-item">Technology <i class="bi bi-chevron-down"></i></a>
                <a href="#" class="text-dark text-decoration-none fw-semibold menu-item">Sustainability</a>
            </div>
        </div>
    </div>
</header>

    <div class="offcanvas offcanvas-end" tabindex="-1" id="mobileMenu" aria-labelledby="mobileMenuLabel">
        <div class="offcanvas-header border-bottom">
            <h5 class="offcanvas-title" id="mobileMenuLabel"></h5>
            <button type="button" class="btn-close shadow-none" data-bs-dismiss="offcanvas" aria-label="Close"></button>
        </div>

        <div class="offcanvas-body p-0">
            <div class="accordion accordion-flush" id="mobileAccordion">

                <div class="accordion-item">
                    <h2 class="accordion-header" id="headingIndustries">
                        <button class="accordion-button collapsed fw-semibold" type="button" data-bs-toggle="collapse"
                            data-bs-target="#collapseIndustries" aria-expanded="false"
                            aria-controls="collapseIndustries">
                            Industries
                        </button>
                    </h2>
                    <div id="collapseIndustries" class="accordion-collapse collapse" aria-labelledby="headingIndustries"
                        data-bs-parent="#mobileAccordion">
                        <div class="accordion-body p-0"></div>
                    </div>
                </div>

                <div class="accordion-item">
                    <h2 class="accordion-header" id="headingServices">
                        <button class="accordion-button collapsed fw-semibold" type="button" data-bs-toggle="collapse"
                            data-bs-target="#collapseServices" aria-expanded="false" aria-controls="collapseServices">
                            Services
                        </button>
                    </h2>
                    <div id="collapseServices" class="accordion-collapse collapse" aria-labelledby="headingServices"
                        data-bs-parent="#mobileAccordion">
                        <div class="accordion-body p-0"></div>
                    </div>
                </div>

                <div class="px-3 py-3 border-bottom">
                    <a href="#" class="d-flex align-items-center gap-2 text-primary text-decoration-none fw-semibold">
                        <span class="mobile-circle-icon"><i class="bi bi-chevron-right"></i></span>
                        <span>Insight</span>
                    </a>
                </div>

                <div class="px-3 py-3 border-bottom">
                    <a href="#" class="d-flex align-items-center gap-2 text-primary text-decoration-none fw-semibold">
                        <span class="mobile-circle-icon"><i class="bi bi-chevron-right"></i></span>
                        <span>Uvance</span>
                    </a>
                </div>

                <div class="px-3 py-3 border-bottom">
                    <a href="#" class="d-flex align-items-center gap-2 text-primary text-decoration-none fw-semibold">
                        <span class="mobile-circle-icon"><i class="bi bi-chevron-right"></i></span>
                        <span>Uvance Wayfinders</span>
                    </a>
                </div>

                <div class="accordion-item">
                    <h2 class="accordion-header" id="headingTechnology">
                        <button class="accordion-button collapsed fw-semibold" type="button" data-bs-toggle="collapse"
                            data-bs-target="#collapseTechnology" aria-expanded="false"
                            aria-controls="collapseTechnology">
                            Technology
                        </button>
                    </h2>
                    <div id="collapseTechnology" class="accordion-collapse collapse" aria-labelledby="headingTechnology"
                        data-bs-parent="#mobileAccordion">
                        <div class="accordion-body p-0"></div>
                    </div>
                </div>

                <div class="px-3 py-3 border-bottom">
                    <a href="#" class="d-flex align-items-center gap-2 text-primary text-decoration-none fw-semibold">
                        <span class="mobile-circle-icon"><i class="bi bi-chevron-right"></i></span>
                        <span>Sustainability</span>
                    </a>
                </div>

                <div class="accordion-item">
                    <h2 class="accordion-header" id="headingAbout">
                        <button class="accordion-button collapsed fw-semibold" type="button" data-bs-toggle="collapse"
                            data-bs-target="#collapseAbout" aria-expanded="false" aria-controls="collapseAbout">
                            About us
                        </button>
                    </h2>
                    <div id="collapseAbout" class="accordion-collapse collapse" aria-labelledby="headingAbout"
                        data-bs-parent="#mobileAccordion">
                        <div class="accordion-body p-0"></div>
                    </div>
                </div>

                <div class="px-3 py-3 border-bottom">
                    <a href="#" class="d-flex align-items-center gap-2 text-primary text-decoration-none fw-semibold">
                        <span class="mobile-circle-icon"><i class="bi bi-chevron-right"></i></span>
                        <span>News</span>
                    </a>
                </div>

                <div class="px-3 py-3 border-bottom">
                    <a href="#" class="d-flex align-items-center gap-2 text-primary text-decoration-none fw-semibold">
                        <span class="mobile-circle-icon"><i class="bi bi-chevron-right"></i></span>
                        <span>Investor Relations</span>
                    </a>
                </div>

                <div class="px-3 py-3 border-bottom">
                    <a href="#" class="d-flex align-items-center gap-2 text-primary text-decoration-none fw-semibold">
                        <span class="mobile-circle-icon"><i class="bi bi-chevron-right"></i></span>
                        <span>Careers</span>
                    </a>
                </div>

            </div>
        </div>
    </div>
    <section class="position-relative overflow-hidden vh-60 d-flex align-items-center"
        style="min-height: 500px;">
        <!-- ویدیو پس‌زمینه -->
        <video autoplay muted loop playsinline class="position-absolute top-0 start-0 w-100 h-100"
            style="object-fit: cover; z-index: 1;">
            <source src="images/mtp-kv-motion.mp4" type="video/mp4">
        </video>

        <!-- لایه رویی برای خوانایی متن (Overlay) -->
        <div class="position-absolute top-0 start-0 w-100 h-100"
            style="background: linear-gradient(90deg, rgba(0,0,0,0.5) 0%, transparent 100%); z-index: 2;"></div>

        <!-- محتوا -->
        <div class="container position-relative text-white" style="z-index: 3;">
            <div class="row">
                <div class="col-md-6">
                    <!-- عنوان -->
                    <h1 class="display-6 fw-semibold mb-4" style="letter-spacing: 0px; line-height: 1.5;">
                        Management Vision<br>2035
                    </h1>

                    <!-- دکمه‌ها -->
                    <div class="d-grid gap-4 d-sm-flex flex-column">
                        <a href="#"
                            class="btn btn-light rounded-pill fw-bold py-2 px-4 d-flex align-items-center justify-content-between"
                            style="width: fit-content; min-width: 240px; color: #000;">
                            Explore the Vision <i class="bi bi-chevron-right ms-3"></i>
                        </a>
                        <a href="#"
                            class="btn btn-light rounded-pill fw-bold py-2 px-4 d-flex align-items-center justify-content-between"
                            style="width: fit-content; min-width: 240px; color: #000;">
                            Watch the Presentation <i class="bi bi-chevron-right ms-3"></i>
                        </a>
                    </div>
                </div>
            </div>
        </div>

        <!-- آیکن کنترل ویدیو پایین سمت راست -->
        <div class="position-absolute bottom-0 end-0 m-4 text-white" style="z-index: 3;">
            <div class="rounded-circle border border-2 border-light d-flex align-items-center justify-content-center"
                style="width: 40px; height: 40px; cursor: pointer;">
                <i class="bi bi-pause-fill fs-5"></i>
            </div>
        </div>
    </section>





    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
